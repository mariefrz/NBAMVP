<!DOCTYPE html>

<html lang="fr">
<head>
    <meta charset="UTF-8">  <meta name="viewport" content="width=device-width, initial-scale=1.0"
<title>NBA MVP Vote 2024</title>
    <style>
        body { font-family: sans-serif; background: #111; color: white; text-align: center; margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
</style>

</head>
<body>
<div class="container">
<h1>Vote pour le MVP 2024</h1>
<p>Choisis ton joueur préféré pour cette saison !</p>
<div class="player-card">
<h3>LeBron James</h3>
<p>Los Angeles Lakers</p>
</div>
<div class="player-card">
<h3>Nikola Jokic</h3>
<p>Denver Nuggets</p>
</div>
<div class="player-card">
<h3>Giannis Antetokounmpo</h3>
<p>Milwaukee Bucks</p>
</div>
<br>
<button type="button" onclick="sendVote('LeBron')"
  ">Voter pour LeBron</button>
<button type="button" onclick="sendVote('Jokic')">Voterpour Jokic</button>
<button type="button" onclick="sendVote('Giannis')
  ">Voterpour Giannis</button>

<script>
function sendVote(player) {
const instagramUser = 'TON_PSEUDO_INSTA_ICI';
const message = 'Vote reçu pour : ' + player;
const url = 'https://www.instagram.com/direct/t/' + instagramUser + '/?text=' + encodeURIComponent(message);
window.location.href = url;
}
</script>
